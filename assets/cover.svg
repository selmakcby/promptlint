<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 480" role="img" aria-labelledby="title desc">
  <title id="title">promptlint</title>
  <desc id="desc">Real-time prompt quality control for Claude Code</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0" stop-color="#001a2e"/>
      <stop offset="1" stop-color="#000000"/>
    </linearGradient>

    <pattern id="grid" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#082F49" stroke-width="1"/>
    </pattern>

    <pattern id="scan" x="0" y="0" width="1" height="3" patternUnits="userSpaceOnUse">
      <rect width="1" height="1" fill="#7DD3FC" fill-opacity="0.05"/>
    </pattern>

    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="0" stop-color="#000" stop-opacity="0"/>
      <stop offset="1" stop-color="#000" stop-opacity="0.9"/>
    </radialGradient>

    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="glowSoft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="glowRed" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- background layers -->
  <rect width="1280" height="480" fill="url(#bg)"/>
  <rect width="1280" height="480" fill="url(#grid)"/>
  <rect width="1280" height="480" fill="url(#scan)"/>
  <rect width="1280" height="480" fill="url(#vignette)"/>

  <!-- corner brackets -->
  <g stroke="#7DD3FC" stroke-width="2" fill="none" filter="url(#glowSoft)">
    <path d="M 30 30 L 30 60 M 30 30 L 60 30"/>
    <path d="M 1250 30 L 1220 30 M 1250 30 L 1250 60"/>
    <path d="M 30 450 L 30 420 M 30 450 L 60 450"/>
    <path d="M 1250 450 L 1220 450 M 1250 450 L 1250 420"/>
  </g>

  <!-- Scene tag -->
  <text x="80" y="80" font-family="JetBrains Mono, ui-monospace, monospace" font-size="14" fill="#0EA5E9" letter-spacing="4">
    ▸ CLAUDE CODE / PROMPT GRADER
  </text>

  <!-- TITLE — huge -->
  <g filter="url(#glow)">
    <text x="80" y="200" font-family="JetBrains Mono, ui-monospace, monospace" font-size="128" font-weight="700" fill="#7DD3FC">
      &gt; promptlint
    </text>
  </g>

  <!-- subtitle -->
  <text x="80" y="252" font-family="JetBrains Mono, ui-monospace, monospace" font-size="20" fill="#E0F2FE" letter-spacing="6">
    TÜRKÇE PROMPT GRADER · CLAUDE CODE İÇİN
  </text>
  <text x="80" y="282" font-family="JetBrains Mono, ui-monospace, monospace" font-size="14" fill="#0EA5E9" letter-spacing="3">
    real-time scoring · token counter dahil · MIT
  </text>

  <!-- divider -->
  <line x1="80" y1="320" x2="1200" y2="320" stroke="#0369A1" stroke-width="1" stroke-dasharray="4,4" opacity="0.6"/>

  <!-- Bad prompt box -->
  <g transform="translate(80, 350)" filter="url(#glowRed)">
    <rect x="0" y="0" width="540" height="80" fill="#000" fill-opacity="0.6" stroke="#ff5566" stroke-width="2"/>
    <!-- corner -->
    <path d="M -1 -1 L -1 12 M -1 -1 L 12 -1" stroke="#ff5566" stroke-width="2.5" fill="none"/>
    <path d="M 541 81 L 541 68 M 541 81 L 528 81" stroke="#ff5566" stroke-width="2.5" fill="none"/>
    <text x="20" y="28" font-family="JetBrains Mono, monospace" font-size="11" fill="#ff5566" letter-spacing="3">▲ KÖTÜ PROMPT</text>
    <text x="20" y="58" font-family="JetBrains Mono, monospace" font-size="20" font-weight="700" fill="#ffaaaa">"kodumu temizle"</text>
    <text x="450" y="58" font-family="JetBrains Mono, monospace" font-size="32" font-weight="700" fill="#ff5566">2/10</text>
  </g>

  <!-- arrow -->
  <g transform="translate(640, 380)" filter="url(#glowSoft)">
    <line x1="0" y1="10" x2="40" y2="10" stroke="#7DD3FC" stroke-width="2"/>
    <polygon points="35,4 45,10 35,16" fill="#7DD3FC"/>
  </g>

  <!-- Good prompt box -->
  <g transform="translate(700, 350)" filter="url(#glow)">
    <rect x="0" y="0" width="500" height="80" fill="#000" fill-opacity="0.6" stroke="#7DD3FC" stroke-width="2"/>
    <path d="M -1 -1 L -1 12 M -1 -1 L 12 -1" stroke="#7DD3FC" stroke-width="2.5" fill="none"/>
    <path d="M 501 81 L 501 68 M 501 81 L 488 81" stroke="#7DD3FC" stroke-width="2.5" fill="none"/>
    <text x="20" y="28" font-family="JetBrains Mono, monospace" font-size="11" fill="#7DD3FC" letter-spacing="3">▶ İYİ PROMPT</text>
    <text x="20" y="58" font-family="JetBrains Mono, monospace" font-size="14" fill="#E0F2FE">"src/auth/login.ts'de validatePassword'ı zod ile..."</text>
    <text x="410" y="58" font-family="JetBrains Mono, monospace" font-size="32" font-weight="700" fill="#7DD3FC">9/10</text>
  </g>

  <!-- footer link -->
  <text x="1200" y="450" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="12" fill="#0369A1" letter-spacing="3">
    github.com/selmakcby/promptlint
  </text>
</svg>
